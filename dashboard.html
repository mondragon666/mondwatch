<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mondwatch · Portfolio Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg:       #050508;
  --s1:       #0a0a10;
  --s2:       #0f0f18;
  --border:   #1c1c2e;
  --border2:  #252540;
  --green:    #00e5a0;
  --red:      #ff3c5a;
  --blue:     #4d9fff;
  --yellow:   #ffcc00;
  --purple:   #a855f7;
  --text:     #e0e0f0;
  --muted:    #555575;
  --w1:       #00e5a0;
  --w2:       #4d9fff;
  --w3:       #a855f7;
  --w4:		  #ec4899; /* Rosa Vibrante (Pink) */
  --w5:       #f97316; /* Laranja Energético (Orange) */
  --w6:       #06b6d4; /* Cyan/Turquesa - Equilíbrio entre o Green e o Blue */
  --w7:       #84cc16; /* Lime/Limão - Transição vibrante entre Yellow e Green */
  --w8:       #8b5cf6; /* Off-White/Cloud - Para contraste máximo em elementos críticos */
  --w9:       #facc15;
  --w10:      #fb7185;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCANLINE BG */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

/* HEADER */
header {
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(5,5,8,0.95);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.logo-mark {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-hex {
  width: 32px;
  height: 32px;
  background: var(--green);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #000;
  font-weight: 700;
}
.logo-text {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #fff;
}
.logo-text span { color: var(--green); }

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
}
.refresh-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  padding: 7px 14px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  border-radius: 2px;
}

/* Atualização na linha ~115 */
.refresh-btn.spinning .refresh-icon,
.pm-card-refresh.spinning .refresh-icon {
  animation: spin 1s linear infinite;
  display: inline-block;
  transform-origin: center center;
}

/* Garante que o botão em si NÃO gire — só o ícone dentro dele */
.refresh-btn.spinning,
.pm-card-refresh.spinning {
  pointer-events: none;
}

/* Garanta que o keyframes esteja assim */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Ajuste específico para o botão da aba Overview (linha ~350) */
.ov-tab-refresh {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  /* ... resto do seu código ... */
}

/* Correção para o conflito de transform no Overview — só o ícone gira */
.ov-tab-refresh.spinning .refresh-icon {
  animation: spin 1s linear infinite;
  display: inline-block;
  transform-origin: center center;
}
.ov-tab-refresh.spinning {
  pointer-events: none;
  opacity: 0.5;
}

/* Removido: animação no próprio botão que causava deslocamento */

.last-update {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
}

/* WALLET TABS */
.wallet-tabs {
  display: flex;
  gap: 0;
  padding: 20px 32px 0;
  border-bottom: 1px solid var(--border);
  overflow: visible;
  margin-bottom: 28px;
}
.wtab {
  padding: 12px 24px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  white-space: nowrap;
}
.wtab:hover { color: var(--text); }
.wtab.active { color: #fff; border-bottom-color: var(--wc); }
.wtab .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--wc); }
.wtab .wtab-pnl { font-size: 11px; opacity: 0.8; }
.wtab.loading .dot { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* COMBINED TAB */
.wtab.combined { border-left: 1px solid var(--border); margin-left: auto; }

/* MAIN CONTENT */
.content {
  padding: 28px 32px;
  max-width: 1600px;
  margin: 0 auto;
}
/* Full-width mode when LIVE panel is active */
.content:has(#panel-live.active) {
  max-width: 100%;
  padding: 28px 24px;
}

/* WALLET PANEL */
.wallet-panel { display: none; }
.wallet-panel.active { display: block; }

/* KPI GRID */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}
.kpi {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}
.kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--kc, var(--green));
}
.kpi:hover { border-color: var(--border2); }
.kpi-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.kpi-val {
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
  color: var(--kc, #fff);
}
.kpi-val.neutral { color: #fff; }
.kpi-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

/* SECTION TITLE */
.sec-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* TWO-COL LAYOUT */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 28px;
}
@media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

/* CHART CARD */
.chart-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
}
.chart-card canvas { width: 100% !important; }

/* TABLE */
.table-wrap {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 28px;
}
.table-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.table-header-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}
.table-count {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  background: var(--border);
  padding: 2px 8px;
  border-radius: 2px;
}
.t-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--s2); }
th {
  padding: 10px 14px;
  text-align: left;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
th.sortable {
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
}
th.sortable:hover { color: var(--text); }
th.sort-asc::after  { content: ' ▲'; color: var(--green); }
th.sort-desc::after { content: ' ▼'; color: var(--green); }
td {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  vertical-align: middle;
  font-weight: 500;
}
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody tr:last-child td { border-bottom: none; }

.outcome-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 2px;
  font-size: 11px;
  font-weight: 700;
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 1px;
}
.outcome-yes { background: rgba(0,229,160,0.12); color: var(--green); }
.outcome-no  { background: rgba(255,60,90,0.12);  color: var(--red); }

.pos-green { color: var(--green); font-weight: 700; }
.pos-red   { color: var(--red);   font-weight: 700; }
.pos-gray  { color: var(--muted); }

.mini-bar {
  width: 60px;
  height: 4px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
  display: inline-block;
  vertical-align: middle;
}
.mini-bar-fill { height: 100%; border-radius: 2px; }

.market-name {
  max-width: 360px;
  overflow: visible;
  text-overflow: unset;
  white-space: normal;
  word-break: break-word;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
}
.market-name a {
  color: inherit;
  text-decoration: none;
}
.market-name a:hover { color: var(--blue); }

/* LOADING STATE */
.loading-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--muted);
}
.loading-state .spinner {
  width: 28px;
  height: 28px;
  border: 2px solid var(--border2);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
.loading-state p {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 2px;
}

/* ERROR STATE */
.error-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--red);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 1px;
}

/* ACTIVITY FEED */
.activity-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: flex-start;
  font-size: 13px;
}
.activity-item:last-child { border-bottom: none; }
.act-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  margin-top: 2px;
}
.act-buy  { background: rgba(0,229,160,0.12); color: var(--green); }
.act-sell { background: rgba(255,60,90,0.12);  color: var(--red); }
.act-redeem { background: rgba(77,159,255,0.12); color: var(--blue); }
.act-time {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
  white-space: nowrap;
}

/* PRICE BADGE */
.price-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  padding: 2px 7px;
  border-radius: 2px;
  background: rgba(255,255,255,0.05);
}

/* EMPTY STATE */
.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
}

/* COMBINED view */
.combined-header {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.wallet-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
}

/* PORTFOLIO SUMMARY CARD (Polymarket-style) */
.portfolio-summary-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 28px;
}
@media (max-width: 700px) { .portfolio-summary-row { grid-template-columns: 1fr; } }

.pm-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
}
.pm-card-refresh {
  position: absolute;
  bottom: 16px;
  right: 20px;
  background: rgba(0,229,160,0.08);
  border: 1px solid var(--border2);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 16px;
  padding: 14px 32px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.25s;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  text-transform: uppercase;
  z-index: 2;
}
.pm-card-refresh:hover {
  background: rgba(0,229,160,0.15);
  border-color: var(--green);
  box-shadow: 0 0 12px rgba(0,229,160,0.15);
}
.pm-card-refresh:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.pm-card-refresh .refresh-icon {
  display: inline-block;
  transition: transform 0.3s;
}
.pm-card-refresh:hover .refresh-icon {
  transform: rotate(90deg);
}
.pm-card-refresh.spinning .refresh-icon {
  animation: spin 0.8s linear infinite;
  display: inline-block;
  transform-origin: center center;
}
.pm-card-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.pm-card-value {
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
  color: #fff;
  letter-spacing: -2px;
}
.pm-card-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  margin-top: 10px;
}
.pm-card-sub.neg { color: var(--red); }
.pm-card-sub.pos { color: var(--green); }
.pm-card-sub.neutral { color: var(--muted); }

.pm-card-available {
  position: absolute;
  top: 22px;
  right: 24px;
  text-align: right;
}
.pm-available-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.pm-available-val {
  font-size: 36px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -1px;
}

/* PnL Chart Card */
.pnl-chart-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.pnl-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}
.pnl-card-left {}
.pnl-value-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.pnl-triangle {
  font-size: 14px;
}
.pnl-triangle.pos { color: var(--green); }
.pnl-triangle.neg { color: var(--red); }
.pnl-card-value {
  font-size: 36px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -1px;
}
.pnl-card-period {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 1px;
}
.pnl-period-tabs {
  display: flex;
  gap: 4px;
  align-items: center;
}
.pnl-ptab {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  color: var(--muted);
  background: transparent;
  border: none;
  transition: all 0.15s;
}
.pnl-ptab:hover { color: var(--text); }
.pnl-ptab.active {
  background: var(--border2);
  color: #fff;
}
.pnl-polymarket-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
}
.pnl-chart-area {
  flex: 1;
  min-height: 80px;
  position: relative;
}
#pnlSvgChart {
  width: 100%;
  height: 90px;
  display: block;
}

/* TRADE NOTIFICATION TOAST — centered overlay, aggregating */
.trade-toast-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  pointer-events: none;
  background: rgba(0,0,0,0);
  transition: background 0.4s ease;
}
.trade-toast-overlay.visible {
  background: rgba(0,0,0,0.4);
  pointer-events: auto;
}
.trade-toast-overlay.exit {
  background: rgba(0,0,0,0);
  pointer-events: none;
}
.trade-toast {
  width: min(440px, 92vw);
  max-height: 85vh;
  border-radius: 16px;
  overflow: hidden;
  background: var(--s1);
  border: 1px solid var(--border2);
  opacity: 0;
  transform: translateY(30px) scale(0.95);
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0,229,160,0.08);
  display: flex;
  flex-direction: column;
  position: relative;
}
.trade-toast-overlay.visible .trade-toast {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.trade-toast-overlay.exit .trade-toast {
  opacity: 0;
  transform: translateY(-20px) scale(0.95);
}
/* Close button */
.trade-toast-close {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: 18px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  z-index: 100;
  line-height: 1;
  backdrop-filter: blur(6px);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.trade-toast-close:hover {
  background: rgba(255,60,90,0.4);
  border-color: var(--red);
}
/* Panel header (count + timer) */
.trade-toast-panel-header {
  padding: 10px 16px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: var(--s2);
}
.trade-toast-panel-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--green);
  text-transform: uppercase;
  font-weight: 700;
}
.trade-toast-panel-count {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  background: var(--border2);
  color: var(--text);
  padding: 1px 7px;
  border-radius: 10px;
  margin-left: auto;
}
/* Scrollable entries area */
.trade-toast-entries {
  overflow-y: auto;
  max-height: calc(85vh - 40px);
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
/* Blur toggle button */
.trade-toast-blur-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.trade-toast-blur-btn:hover {
  border-color: var(--yellow);
  color: var(--yellow);
}
.trade-toast-blur-btn.active {
  background: rgba(255,204,0,0.1);
  border-color: var(--yellow);
  color: var(--yellow);
}
/* Blurred wallet info in toast */
.toast-wallet-blurred .trade-toast-wallet-addr,
.toast-wallet-blurred .trade-toast-wallet-label {
  filter: blur(5px);
  user-select: none;
  transition: filter 0.2s;
}
.toast-wallet-blurred .trade-toast-wallet-dot {
  filter: blur(3px);
  transition: filter 0.2s;
}
/* Individual toast entry with city image */
.trade-toast-entry {

.trade-toast-img {

  height: 120px;
  overflow: hidden;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
}
.trade-toast-img img {
  width: 100%;
  height: 100%;

  filter: brightness(0.65);
}
.trade-toast-img-overlay {
  position: absolute;

  align-items: center;
  gap: 8px;

.trade-toast-badge {

  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.trade-toast-badge.buy {
  background: var(--green);
  color: #000;
}
.trade-toast-badge.sell {
  background: var(--red);
  color: #fff;
}
.trade-toast-badge.redeem {
  background: var(--blue);
  color: #fff;
}
.trade-toast-time {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}
.trade-toast-body {
  padding: 14px 20px 16px;
}
.trade-toast-market {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  line-height: 1.35;
  margin-bottom: 12px;
}
.trade-toast-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.trade-toast-stat {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
}
.trade-toast-stat-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;

}
.trade-toast-stat-val {
  font-size: 20px;
  font-weight: 700;
}
.trade-toast-wallet {

.trade-toast-wallet-dot {

  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}
.trade-toast-wallet-addr {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  margin-left: auto;
}
.trade-toast-amount {
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--muted);

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ANIMATIONS */
.fade-in { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.glow {
  text-shadow: 0 0 20px currentColor;
}

/* TRADER STATS BANNER */

  border-radius: 4px;
  padding: 12px 20px;
  margin-bottom: 20px;
  gap: 0;
  flex-wrap: nowrap;
  overflow: hidden;
}

  display: flex;
  flex-direction: column;
  gap: 3px;
  flex: 1;
  min-width: 0;
}

  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

  color: #fff;
  letter-spacing: -0.5px;

/* OVERVIEW LAYOUT */

  gap: 16px;
  margin-bottom: 4px;
}
@media (max-width: 1200px) { .overview-wallet-row { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 900px) { .overview-wallet-row { grid-template-columns: 1fr; } }
.ov-wallet-card {
  background: var(--s1);
  border: 1px solid var(--border);

}

.ov-total { font-size:32px; font-weight:700; color:#fff; letter-spacing:-1px; margin-bottom:12px; }
.ov-breakdown { display:flex; gap:0; margin-bottom:8px; }
.ov-bitem { flex:1; }
.ov-blabel { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:2px; }

.ov-divider { height:1px; background:var(--border); margin:10px 0; }

/* EDIT LABEL ICON */
.edit-label {

  font-size: 12px;

  color: var(--muted);
  transition: opacity 0.15s, color 0.15s;
  padding: 0 2px;
}
.wtab:hover .edit-label { opacity: 1; }
.edit-label:hover { color: var(--green); }

/* OVERVIEW HIDE TOGGLE */
.ov-hide-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  cursor: pointer;
  border-radius: 2px;
  letter-spacing: 1px;
  transition: all 0.15s;
  margin-bottom: 16px;
}
.ov-hide-btn:hover { border-color: var(--green); color: var(--green); }

/* OVERVIEW TAB REFRESH BUTTON */
.ov-tab-refresh {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 3px 10px;
  letter-spacing: 1px;
  background: rgba(255,204,0,0.08);
  border: 1px solid var(--border2);
  color: var(--yellow);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  white-space: nowrap;
  z-index: 10;
}
.ov-tab-refresh:hover {
  background: rgba(255,204,0,0.15);
  border-color: var(--yellow);
  box-shadow: 0 0 8px rgba(255,204,0,0.15);
}
.ov-tab-refresh.spinning {
  pointer-events: none;
  opacity: 0.5;
}
.wtab.active .ov-tab-refresh { display: block; }

/* OVERVIEW TRADER BANNERS */
.ov-trader-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}
.ov-trader-banner {
  display: flex;
  align-items: center;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px 24px;
  gap: 0;
  flex-wrap: nowrap;
  overflow: hidden;
}
.ov-ts-item { display:flex; flex-direction:column; gap:4px; flex:1; min-width:120px; }
.ov-ts-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; white-space:nowrap; }
.ov-ts-val { font-size:22px; font-weight:700; color:#fff; white-space:nowrap; }
.ov-ts-sep { width:1px; height:40px; background:var(--border); margin:0 20px; flex-shrink:0; }

/* OVERVIEW PNL CHARTS ROW */
.ov-pnl-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
  margin-top: 20px;
}
@media (max-width: 1200px) { .ov-pnl-row { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px) { .ov-pnl-row { grid-template-columns: 1fr; } }

/* ON-CHAIN LIVE PANEL */
.onchain-panel {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}
.onchain-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;

  background: linear-gradient(90deg, var(--green), var(--blue), var(--purple));
}

/* Live panel full-width override */
.wallet-panel[id="panel-live"].active {
  max-width: 100%;
}
.wallet-panel[id="panel-live"] .onchain-panel {
  border-radius: 6px;
}
.wallet-panel[id="panel-live"] .live-summary-val {
  font-size: 28px;
}
.wallet-panel[id="panel-live"] .live-table td {
  font-size: 16px;
  padding: 18px 20px;
}
.wallet-panel[id="panel-live"] .live-table th {
  font-size: 11px;
  padding: 14px 20px;
  letter-spacing: 2.5px;
}
.wallet-panel[id="panel-live"] .live-wallet-name {
  font-size: 15px;
}
.wallet-panel[id="panel-live"] .onchain-act-market {
  font-size: 15px;
}
.wallet-panel[id="panel-live"] .onchain-act-val {
  font-size: 14px;
}
.wallet-panel[id="panel-live"] .onchain-act-time {
  font-size: 13px;
}
.onchain-header {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
}
.onchain-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.onchain-live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green), 0 0 16px rgba(0,229,160,0.3);
  animation: pulse-live 2s infinite;
  flex-shrink: 0;
}
@keyframes pulse-live {
  0%,100% { opacity: 1; box-shadow: 0 0 8px var(--green), 0 0 16px rgba(0,229,160,0.3); }
  50% { opacity: 0.5; box-shadow: 0 0 4px var(--green), 0 0 8px rgba(0,229,160,0.15); }
}
.onchain-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--green);
  font-weight: 700;
}
.onchain-network {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--purple);
  background: rgba(168,85,247,0.1);
  padding: 2px 8px;
  border-radius: 2px;
  border: 1px solid rgba(168,85,247,0.2);
}
.onchain-addr {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
}
.onchain-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}
.onchain-cell {
  padding: 18px 22px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.onchain-cell:hover { background: rgba(255,255,255,0.015); }
.onchain-cell:nth-child(4n) { border-right: none; }
.onchain-cell:nth-last-child(-n+4) { border-bottom: none; }
.onchain-cell-primary {
  grid-column: span 2;
}
.onchain-cell-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.onchain-cell-value {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
  margin-bottom: 6px;
}
.onchain-cell-sub {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}
.onchain-exposure-bar {
  width: 60px;
  height: 4px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
  display: inline-block;
}
.onchain-exposure-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}
@media (max-width: 900px) {
  .onchain-grid { grid-template-columns: repeat(2, 1fr); }
  .onchain-cell-primary { grid-column: span 1; }
  .onchain-cell:nth-child(4n) { border-right: 1px solid var(--border); }
  .onchain-cell:nth-child(2n) { border-right: none; }
}

/* ON-CHAIN ACTIVITY FEED */
.onchain-activity {
  border-top: 1px solid var(--border);
}
.onchain-activity-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 24px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--green);
  border-bottom: 1px solid var(--border);

}
.onchain-activity-list {
  max-height: 460px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.onchain-act-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 14px;
  transition: background 0.1s;
}
.onchain-act-row:hover { background: rgba(255,255,255,0.02); }
.onchain-act-row:last-child { border-bottom: none; }
.onchain-act-latest {
  background: rgba(0,229,160,0.03);
  border-left: 2px solid var(--green);
}
.onchain-act-icon {
  font-size: 12px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}
.onchain-act-type {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  min-width: 50px;
  flex-shrink: 0;
}
.onchain-act-market {
  flex: 1;
  color: var(--text);
  font-weight: 500;
  font-size: 14px;
  min-width: 0;
  line-height: 1.3;
}
.onchain-act-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: var(--blue);
  white-space: nowrap;
  flex-shrink: 0;
}
.onchain-act-time {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 55px;
  text-align: right;
}

/* LIVE WALLET ROWS — table layout for perfect alignment */
.live-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}
.live-table thead {
  background: var(--s2);
}
.live-table th {
  padding: 12px 18px;
  text-align: left;
  font-family: 'Share Tech Mono', monospace;

  color: var(--muted);
  text-transform: uppercase;

  border-bottom: 1px solid var(--border);
}
.live-table td {
  padding: 16px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.03);

  font-size: 15px;
}
.live-table tbody tr {
  transition: background 0.15s;
}
.live-table tbody tr:hover {
  background: rgba(255,255,255,0.02);
}
.live-table tbody tr:last-child td {
  border-bottom: none;
}
.live-wallet-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}
.live-wallet-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.live-wallet-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.live-wallet-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
}
.live-wallet-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  display: flex;
  gap: 6px;
  align-items: center;
}
.live-rank-badge {
  color: var(--yellow);
}
.live-cash-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.5px;
  display: block;
  margin-top: 2px;
}
.live-pos-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  display: block;
  margin-top: 2px;
}

/* Live summary cards */
.live-summary-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
  border-bottom: 1px solid var(--border);
}
.live-summary-cell {
  padding: 20px 24px;
  border-right: 1px solid var(--border);
}
.live-summary-cell:last-child { border-right: none; }
.live-summary-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.live-summary-val {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
}
.live-summary-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
}

@media (max-width: 1100px) {
  .live-summary-grid { grid-template-columns: repeat(3, 1fr); }
  .live-table { font-size: 12px; }
  .live-table th, .live-table td { padding: 10px 10px; }
}
@media (max-width: 700px) {
  .live-summary-grid { grid-template-columns: repeat(2, 1fr); }
}

// ─── Fetch helpers ────────────────────────────────────────────────
async function apiFetch(url) {
  try {
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) {
    console.warn('Fetch error:', url, e.message);
    return null;
  }
}

// Fetch USDC balance on Polygon via Etherscan v2 API (chainid=137)
// With retry logic and staggered delays to avoid rate limits
async function fetchUsdcBalance(addr, retries = 3, delayMs = 0) {
  if (delayMs > 0) await new Promise(r => setTimeout(r, delayMs));

  for (let attempt = 1; attempt <= retries; attempt++) {
    try {
      const url = `${ETHERSCAN_V2_API}?chainid=137&module=account&action=tokenbalance` +
                  `&contractaddress=${USDC_CONTRACT_POLYGON}&address=${addr}&tag=latest&apikey=${ETHERSCAN_KEY}`;
      const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      console.log(`Etherscan USDC [attempt ${attempt}] for ${addr.slice(0,8)}:`, JSON.stringify(data));

      if (data.status === '0' && data.result && data.result.toLowerCase().includes('rate limit')) {
        console.warn(`Etherscan rate limited [attempt ${attempt}], retrying in ${attempt * 1500}ms...`);
        await new Promise(r => setTimeout(r, attempt * 1500));
        continue;
      }

      if (data.status === '1' && data.result) {
        return parseFloat(data.result) / 1e6;
      }

      if (attempt < retries) {
        console.warn(`Etherscan status!=1 [attempt ${attempt}]:`, data.message, '— retrying in', attempt * 1000, 'ms');
        await new Promise(r => setTimeout(r, attempt * 1000));
        continue;
      }

      console.warn('Etherscan returned status!=1 after all retries:', data.message, data.result);
      return 0;
    } catch(e) {
      console.warn(`Etherscan fetch error [attempt ${attempt}]:`, addr.slice(0,8), e.message);
      if (attempt < retries) {
        await new Promise(r => setTimeout(r, attempt * 1000));
        continue;
      }
      return 0;
    }
  }
  return 0;
}

async function loadWallet(idx) {
  const addr = WALLETS[idx].addr;

    apiFetch(`${DATA_API}/closed-positions?user=${addr}&limit=500`),
    apiFetch(`${DATA_API}/activity?user=${addr}&limit=100`),
    apiFetch(`${DATA_API}/value?user=${addr}`)
  ]);

  // Fetch trades and leaderboard in parallel
  // USDC balance is fetched with staggered delay (idx * 400ms) to avoid Etherscan rate limit
  const [trades, leaderboard, usdcBalance] = await Promise.all([
    apiFetch(`${DATA_API}/trades?user=${addr}&limit=500`),
    apiFetch(`${DATA_API}/v1/leaderboard?timePeriod=all&orderBy=PNL&limit=1&offset=0&category=overall&user=${addr}`),
    fetchUsdcBalance(addr, 3, idx * 400)
  ]);

  // Fetch PnL time-series for all 4 periods in parallel
  const PNL_API = 'https://user-pnl-api.polymarket.com/user-pnl';
  const [pnl1d, pnl1w, pnl1m, pnlAll] = await Promise.all([
    apiFetch(`${PNL_API}?user_address=${addr}&interval=1d&fidelity=1h`),
    apiFetch(`${PNL_API}?user_address=${addr}&interval=1w&fidelity=3h`),
    apiFetch(`${PNL_API}?user_address=${addr}&interval=1m&fidelity=1d`),
    apiFetch(`${PNL_API}?user_address=${addr}&interval=all&fidelity=12h`),
  ]);
  const pnlSeries = { '1D': pnl1d, '1W': pnl1w, '1M': pnl1m, 'ALL': pnlAll };
  console.log(`W${idx+1} pnlSeries ALL sample:`, JSON.stringify(pnlAll?.slice(0,2)));

  walletData[idx] = { positions, closed, activity, value, trades, usdcBalance, leaderboard, pnlSeries };
  return walletData[idx];
}

// ─── PnL / Math helpers ───────────────────────────────────────────
function fmt$(n, decimals=2) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  const s = abs.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  return (n < 0 ? '-$' : '$') + s;
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
}
function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(typeof ts === 'number' ? ts * 1000 : ts);
  const now = Date.now();
  const diff = (now - d.getTime()) / 1000;
  if (diff < 60)   return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400)return Math.floor(diff/3600) + 'h ago';
  return d.toLocaleDateString('pt-BR');
}
function pnlClass(n) { return n > 0 ? 'pos-green' : n < 0 ? 'pos-red' : 'pos-gray'; }
function pnlSign(n) { return n > 0 ? '+' : ''; }

    // Exclude if current price is exactly 0 or 1 (market fully resolved) — only if field exists

    const activePositions = positions.filter(p => (parseFloat(p.currentValue)||0) > 0.01);

    html += `</tbody></table></div>`;
  }
  html += `</div>`;

  html += `</div>`;

  el.innerHTML = html;

  // Draw charts

  }, 50);
}

// ─── Charts ───────────────────────────────────────────────────────
function drawPieChart(idx, positions) {
  const canvas = document.getElementById(`pie-${idx}`);
  if (!canvas || positions.length === 0) return;
  const W = canvas.parentElement.clientWidth - 40;
  const H = 200;
  canvas.width = W; canvas.height = H;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');

  // Top 8 by value
  const top = [...positions].sort((a,b) => (parseFloat(b.currentValue)||0) - (parseFloat(a.currentValue)||0)).slice(0,8);
  const total = top.reduce((s,p) => s + (parseFloat(p.currentValue)||0), 0);
  if (total <= 0) { ctx.fillStyle = '#555'; ctx.font = '12px Share Tech Mono'; ctx.fillText('Sem valor', 10, 20); return; }

  const COLORS = ['#00e5a0','#4d9fff','#a855f7','#ffcc00','#ff3c5a','#ff9f1c','#00b4d8','#80ed99'];
  const cx = H / 2, cy = H / 2, r = H * 0.38;
  let angle = -Math.PI / 2;

  ctx.fillStyle = '#07070d';
  ctx.fillRect(0, 0, W, H);

  top.forEach((p, i) => {
    const val = parseFloat(p.currentValue) || 0;
    const slice = (val / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#07070d';
    ctx.lineWidth = 2;
    ctx.stroke();
    angle += slice;
  });

  // Donut hole
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2);
  ctx.fillStyle = '#07070d';
  ctx.fill();

  // Center text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Rajdhani';
  ctx.textAlign = 'center';
  ctx.fillText('$' + (total >= 1000 ? (total/1000).toFixed(1)+'K' : total.toFixed(0)), cx, cy + 5);

  // Legend
  const lx = H + 12;
  top.slice(0, 6).forEach((p, i) => {
    const y = 18 + i * 26;
    ctx.fillStyle = COLORS[i];
    ctx.fillRect(lx, y - 7, 10, 10);
    ctx.fillStyle = '#888';
    ctx.font = '11px Share Tech Mono';
    ctx.textAlign = 'left';
    const label = (p.title || p.market || '').slice(0, 22);
    ctx.fillText(label + '…', lx + 14, y + 3);
    const val = parseFloat(p.currentValue) || 0;
    ctx.fillStyle = '#ccc';
    ctx.font = 'bold 11px Share Tech Mono';
    ctx.textAlign = 'right';
    ctx.fillText('$'+val.toFixed(0), W - 2, y + 3);
    ctx.textAlign = 'left';
  });
}

function drawBarChart(idx, positions) {
  const canvas = document.getElementById(`bar-${idx}`);
  if (!canvas || positions.length === 0) return;
  const W = canvas.parentElement.clientWidth - 40;
  const H = 200;
  canvas.width = W; canvas.height = H;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#07070d';
  ctx.fillRect(0, 0, W, H);

  const top = [...positions]
    .filter(p => parseFloat(p.cashPnl) !== 0)
    .sort((a,b) => (parseFloat(b.cashPnl)||0) - (parseFloat(a.cashPnl)||0))
    .slice(0, 10);

  if (top.length === 0) {
    ctx.fillStyle = '#555'; ctx.font = '11px Share Tech Mono';
    ctx.fillText('Sem dados de PnL', 10, H/2);
    return;
  }

  const pnls = top.map(p => parseFloat(p.cashPnl) || 0);
  const maxAbs = Math.max(...pnls.map(Math.abs), 0.01);

  const PAD = { top: 10, right: 10, bottom: 30, left: 10 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;
  const barW = Math.max(8, cW / top.length - 4);
  const midY = PAD.top + cH / 2;

  // Zero line
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(PAD.left, midY); ctx.lineTo(W - PAD.right, midY); ctx.stroke();
  ctx.setLineDash([]);

  top.forEach((p, i) => {
    const pnl = pnls[i];
    const x = PAD.left + i * (cW / top.length) + (cW / top.length - barW) / 2;
    const barH = (Math.abs(pnl) / maxAbs) * (cH / 2 - 4);
    const y = pnl >= 0 ? midY - barH : midY;
    ctx.fillStyle = pnl >= 0 ? 'rgba(0,229,160,0.8)' : 'rgba(255,60,90,0.8)';
    ctx.fillRect(x, y, barW, barH);

    ctx.fillStyle = '#555';
    ctx.font = '9px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.save();
    ctx.translate(x + barW/2, H - 4);
    ctx.rotate(-Math.PI/4);
    ctx.fillText((p.title || p.market || '').slice(0,12), 0, 0);
    ctx.restore();

    // Value label
    ctx.fillStyle = pnl >= 0 ? 'var(--green)' : 'var(--red)';
    ctx.font = 'bold 9px Share Tech Mono';
    ctx.textAlign = 'center';
    const lbl = (pnl >= 0 ? '+' : '') + '$' + Math.abs(pnl).toFixed(1);
    ctx.fillText(lbl, x + barW/2, pnl >= 0 ? y - 3 : y + barH + 10);
  });
}

// ─── PnL Sparkline SVG ───────────────────────────────────────────
function drawPnlSvgChart(idx, period) {
  const svg = document.getElementById(`pnl-svg-${idx}`);
  if (!svg) return;

  const d = walletData[idx];
  if (!d) return;

  // Use real API series: { t: unix_seconds, p: pnl_value }
  const series = Array.isArray(d.pnlSeries?.[period]) ? d.pnlSeries[period] : [];

  svg.innerHTML = '';

  if (series.length < 2) {
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', '200'); text.setAttribute('y', '45');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', '#555575');
    text.setAttribute('font-size', '11');
    text.setAttribute('font-family', 'Share Tech Mono, monospace');
    text.textContent = 'sem dados para este período';
    svg.appendChild(text);
    return;
  }

  const W = 400, H = 80, pad = 4;
  const xs = series.map(p => p.t);
  const ys = series.map(p => p.p);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 0.01;

  const toSX = x => pad + ((x - minX) / rangeX) * (W - 2 * pad);
  const toSY = y => H - pad - ((y - minY) / rangeY) * (H - 2 * pad);

  const finalPnl = ys[ys.length - 1];
  const isPos = finalPnl >= 0;
  const lineColor = isPos ? '#00e5a0' : '#ff3c5a';
  const fillColor = isPos ? 'rgba(0,229,160,0.12)' : 'rgba(255,60,90,0.12)';

  const coords = series.map((p, i) =>
    `${i === 0 ? 'M' : 'L'} ${toSX(p.t).toFixed(1)} ${toSY(p.p).toFixed(1)}`
  ).join(' ');

  // Fill area
  const firstX = toSX(series[0].t).toFixed(1);
  const lastX  = toSX(series[series.length - 1].t).toFixed(1);
  const fillPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  fillPath.setAttribute('d', `${coords} L ${lastX} ${H} L ${firstX} ${H} Z`);
  fillPath.setAttribute('fill', fillColor);
  svg.appendChild(fillPath);

  // Gradient line
  const gradId = `grad-${idx}-${period}`;
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
  grad.setAttribute('id', gradId);
  grad.setAttribute('x1', '0%'); grad.setAttribute('x2', '100%');
  grad.setAttribute('y1', '0%'); grad.setAttribute('y2', '0%');
  const s1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
  s1.setAttribute('offset', '0%'); s1.setAttribute('stop-color', '#a855f7');
  const s2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
  s2.setAttribute('offset', '100%'); s2.setAttribute('stop-color', lineColor);
  grad.appendChild(s1); grad.appendChild(s2);
  defs.appendChild(grad);
  svg.appendChild(defs);

  const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  line.setAttribute('d', coords);
  line.setAttribute('fill', 'none');
  line.setAttribute('stroke', `url(#${gradId})`);
  line.setAttribute('stroke-width', '2');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(line);

  // End dot
  const last = series[series.length - 1];
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('cx', toSX(last.t));
  dot.setAttribute('cy', toSY(last.p));
  dot.setAttribute('r', '3');
  dot.setAttribute('fill', lineColor);
  svg.appendChild(dot);

  // Update PnL value on the card for this period
  const pnlEl = document.getElementById(`pnl-card-val-${idx}`);
  const triEl = document.getElementById(`pnl-card-tri-${idx}`);
  const lblEl = document.getElementById(`pnl-card-lbl-${idx}`);
  if (pnlEl) {
    // delta = last value minus first value of the series
    const periodPnl = ys[ys.length - 1] - ys[0];
    const isP = periodPnl >= 0;
    pnlEl.textContent = (isP ? '+' : '') + '$' +
      Math.abs(periodPnl).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    pnlEl.className = 'pnl-card-value ' + (isP ? 'pos-green' : 'pos-red');
    if (triEl) { triEl.textContent = isP ? '▲' : '▼'; triEl.className = 'pnl-triangle ' + (isP ? 'pos' : 'neg'); }
    if (lblEl) {
      const labels = { '1D': 'Past Day', '1W': 'Past Week', '1M': 'Past Month', 'ALL': 'All-Time' };
      lblEl.textContent = 'Profit / Loss · ' + (labels[period] || period);
    }
  }
}

function setPnlPeriod(btn, period, idx) {
  btn.closest('.pnl-period-tabs').querySelectorAll('.pnl-ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  drawPnlSvgChart(idx, period);
}

function drawOvChart(idx, period) {
  const svg = document.getElementById(`ov-svg-${idx}`);
  if (!svg) return;
  const d = walletData[idx];
  if (!d) return;

  const series = Array.isArray(d.pnlSeries?.[period]) ? d.pnlSeries[period] : [];
  svg.innerHTML = '';

  if (series.length < 2) {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x','200'); t.setAttribute('y','40');
    t.setAttribute('text-anchor','middle'); t.setAttribute('fill','#555575');
    t.setAttribute('font-size','10'); t.textContent = 'sem dados';
    svg.appendChild(t); return;
  }

  const W=400,H=80,pad=4;
  const xs=series.map(p=>p.t), ys=series.map(p=>p.p);
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  const minY=Math.min(...ys),maxY=Math.max(...ys);
  const rX=maxX-minX||1, rY=maxY-minY||0.01;
  const toSX=x=>pad+((x-minX)/rX)*(W-2*pad);
  const toSY=y=>H-pad-((y-minY)/rY)*(H-2*pad);

  const finalPnl=ys[ys.length-1];
  const isPos=finalPnl>=0;
  const lc=isPos?'#00e5a0':'#ff3c5a';
  const fc=isPos?'rgba(0,229,160,0.12)':'rgba(255,60,90,0.12)';
  const coords=series.map((p,i)=>`${i===0?'M':'L'} ${toSX(p.t).toFixed(1)} ${toSY(p.p).toFixed(1)}`).join(' ');

  const fX=toSX(series[0].t).toFixed(1), lX=toSX(series[series.length-1].t).toFixed(1);
  const fp=document.createElementNS('http://www.w3.org/2000/svg','path');
  fp.setAttribute('d',`${coords} L ${lX} ${H} L ${fX} ${H} Z`);
  fp.setAttribute('fill',fc); svg.appendChild(fp);

  const gId=`ov-grad-${idx}-${period}`;
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const g=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
  g.setAttribute('id',gId); g.setAttribute('x1','0%'); g.setAttribute('x2','100%');
  g.setAttribute('y1','0%'); g.setAttribute('y2','0%');
  const s1=document.createElementNS('http://www.w3.org/2000/svg','stop');
  s1.setAttribute('offset','0%'); s1.setAttribute('stop-color','#a855f7');
  const s2=document.createElementNS('http://www.w3.org/2000/svg','stop');
  s2.setAttribute('offset','100%'); s2.setAttribute('stop-color',lc);
  g.appendChild(s1); g.appendChild(s2); defs.appendChild(g); svg.appendChild(defs);

  const ln=document.createElementNS('http://www.w3.org/2000/svg','path');
  ln.setAttribute('d',coords); ln.setAttribute('fill','none');
  ln.setAttribute('stroke',`url(#${gId})`); ln.setAttribute('stroke-width','2');
  ln.setAttribute('stroke-linecap','round'); ln.setAttribute('stroke-linejoin','round');
  svg.appendChild(ln);

  const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx',toSX(series[series.length-1].t));
  dot.setAttribute('cy',toSY(series[series.length-1].p));
  dot.setAttribute('r','3'); dot.setAttribute('fill',lc); svg.appendChild(dot);

  // Update value label
  const pnlEl=document.getElementById(`ov-pnl-val-${idx}`);
  const lblEl=document.getElementById(`ov-pnl-lbl-${idx}`);
  if (pnlEl) {
    const delta=ys[ys.length-1]-ys[0];
    const isP=delta>=0;
    pnlEl.textContent=(isP?'+':'')+'\$'+Math.abs(delta).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    pnlEl.className='pnl-card-value '+(isP?'pos-green':'pos-red');
  }
  if (lblEl) {
    const labels={'1D':'Past Day','1W':'Past Week','1M':'Past Month','ALL':'All-Time'};
    lblEl.textContent='Profit / Loss · '+(labels[period]||period);
  }
}

function setOvPeriod(btn, period, idx) {
  btn.closest('.pnl-period-tabs').querySelectorAll('.pnl-ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  drawOvChart(idx, period);
}

// ─── Live Panel (all wallets on-chain) ────────────────────────────
function renderLive() {
  const el = document.getElementById('panel-live');
  if (!el) return;

  function walletInfo(d, i) {
    const w = WALLETS[i];
    const rawPos = Array.isArray(d?.positions) ? d.positions : [];
    const closed = Array.isArray(d?.closed) ? d.closed : [];
    const closedIds = new Set(closed.map(p => p.conditionId).filter(Boolean));
    const positions = rawPos.filter(p => {
      if (p.conditionId && closedIds.has(p.conditionId)) return false;
      const cpRaw = p.currPrice ?? p.currentPrice ?? null;
      if (cpRaw !== null) {
        const cp = parseFloat(cpRaw) || 0;
        if (cp >= 0.999) return false;
      }
      return true;
    });
    const posVal = positions.reduce((a,p) => a+(parseFloat(p.currentValue)||0), 0);
    const onChain = typeof d?.usdcBalance === 'number' ? d.usdcBalance : 0;
    const apiCash = d?.value ? (parseFloat(d.value.cashBalance) || parseFloat(d.value.availableBalance) || parseFloat(d.value.usdcBalance) || parseFloat(d.value.cash) || 0) : 0;
    const cash = onChain >= 0.01 ? onChain : apiCash;
    const cashSrc = onChain >= 0.01 ? 'on-chain' : (apiCash > 0 ? 'api' : 'none');
    let total = posVal + cash;
    if (cash < 0.01 && d?.value?.value) { const api = parseFloat(d.value.value)||0; if (api > posVal) total = api; }
    const lb = Array.isArray(d?.leaderboard) ? d.leaderboard[0] : null;
    const pnl = parseFloat(lb?.pnl || 0);
    const vol = parseFloat(lb?.vol || 0);
    const rank = lb?.rank ? parseInt(lb.rank) : null;
    const name = lb?.userName || w.label;
    const posCount = positions.filter(p => (parseFloat(p.currentValue)||0) > 0.01).length;
    const closedCount = closed.length;
    const wins = closed.filter(p => (parseFloat(p.realizedPnl)||0) > 0).length;
    const winRate = closedCount > 0 ? ((wins / closedCount) * 100).toFixed(0) : '—';
    const exposure = total > 0 ? ((posVal / total) * 100).toFixed(0) : '0';
    const activity = Array.isArray(d?.activity) ? d.activity : [];
    return { w, total, posVal, cash, cashSrc, pnl, vol, rank, name, posCount, closedCount, wins, winRate, exposure, activity, positions };
  }

  const infos = WALLETS.map((w, i) => walletData[i] ? walletInfo(walletData[i], i) : null);

  // Totals
  const grandTotal = infos.reduce((s, info) => s + (info?.total || 0), 0);
  const grandCash = infos.reduce((s, info) => s + (info?.cash || 0), 0);
  const grandPos = infos.reduce((s, info) => s + (info?.posVal || 0), 0);
  const grandPnl = infos.reduce((s, info) => s + (info?.pnl || 0), 0);
  const grandVol = infos.reduce((s, info) => s + (info?.vol || 0), 0) + pastWalletsVolume;
  const totalOpenPos = infos.reduce((s, info) => s + (info?.posCount || 0), 0);

  let html = `<div class="fade-in">`;

  // ── Header ──
  html += `<div class="onchain-panel" style="border-radius:6px;margin-bottom:20px">
    <div class="onchain-header" style="padding-bottom:0">
      <div class="onchain-title-row">
        <span class="onchain-live-dot"></span>
        <span class="onchain-title">MULTI-WALLET · ON-CHAIN LIVE</span>
        <span class="onchain-network">⬡ POLYGON</span>
        <span style="margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted)">${WALLETS.length} wallets</span>
      </div>
    </div>

    <!-- Summary cards -->
    <div class="live-summary-grid">
      <div class="live-summary-cell">
        <div class="live-summary-label">Portfolio Total</div>
        <div class="live-summary-val">${fmt$(grandTotal)}</div>
        <div class="live-summary-sub">posições + cash</div>
      </div>
      <div class="live-summary-cell">
        <div class="live-summary-label">Cash Disponível</div>
        <div class="live-summary-val" style="color:var(--blue)">${fmt$(grandCash)}</div>
        <div class="live-summary-sub">para trade</div>
      </div>
      <div class="live-summary-cell">
        <div class="live-summary-label">Em Posições</div>
        <div class="live-summary-val">${fmt$(grandPos)}</div>
        <div class="live-summary-sub">${totalOpenPos} abertas</div>
      </div>
      <div class="live-summary-cell">
        <div class="live-summary-label">PnL Total</div>
        <div class="live-summary-val ${pnlClass(grandPnl)}">${pnlSign(grandPnl)}${fmt$(grandPnl)}</div>
        <div class="live-summary-sub">all-time</div>
      </div>
      <div class="live-summary-cell">
        <div class="live-summary-label">Volume Total</div>
        <div class="live-summary-val">${fmt$(grandVol)}</div>
        <div class="live-summary-sub">all-time${pastWallets.length > 0 ? ' + '+pastWallets.length+' inativas' : ''}</div>
      </div>
    </div>

    <!-- Wallets table -->
    <div class="t-scroll">
    <table class="live-table">
      <thead><tr>
        <th>Wallet</th>
        <th>Portfolio</th>
        <th>Disponível</th>
        <th>Posições</th>
        <th>PnL</th>
        <th>Volume</th>
      </tr></thead>
      <tbody>`;

  infos.forEach((info, i) => {
    if (!info) {
      html += `<tr><td colspan="6" style="color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px">
        <span style="color:${WALLETS[i].color}">${WALLETS[i].label}</span> · carregando…
      </td></tr>`;
      return;
    }
    const { w, total, posVal, cash, cashSrc, pnl, vol, rank, name, posCount, closedCount, wins, winRate } = info;

    html += `<tr>
      <td>
        <div class="live-wallet-cell">
          <div class="live-wallet-dot" style="background:${w.color}"></div>
          <div class="live-wallet-info">
            <div class="live-wallet-name" style="color:${w.color}">${name}</div>
            <div class="live-wallet-sub">
              ${w.short}
              ${rank ? `<span class="live-rank-badge">#${rank.toLocaleString()}</span>` : ''}
            </div>
          </div>
        </div>
      </td>
      <td style="font-weight:700;color:#fff;font-size:17px">${fmt$(total)}</td>
      <td>
        <span style="font-weight:700;color:var(--blue)">${fmt$(cash)}</span>
        <span class="live-cash-tag" style="color:${cashSrc==='on-chain'?'var(--green)':'var(--yellow)'}">${cashSrc==='on-chain'?'⬡ verified':'~ est'}</span>
      </td>
      <td>
        <span style="font-weight:700">${fmt$(posVal)}</span>
        <span class="live-pos-tag" style="color:${w.color}">${posCount} abertas</span>
      </td>
      <td class="${pnlClass(pnl)}" style="font-weight:700">${pnlSign(pnl)}${fmt$(pnl)}</td>
      <td style="font-weight:500">${vol > 0 ? fmt$(vol) : '—'}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;

  // ── Activity feed (all wallets merged) ──
  const allActivity = infos.flatMap((info, i) =>
    (info?.activity || []).slice(0, 8).map(a => ({ ...a, _wi: i }))
  ).filter(a => {
    const type = (a.type || '').toUpperCase();
    return !type.includes('REDEEM');
  }).sort((a, b) => {
    const tA = new Date(a.timestamp || a.createdAt || 0).getTime();
    const tB = new Date(b.timestamp || b.createdAt || 0).getTime();
    return tB - tA;
  }).slice(0, 20);

  html += `<div style="height:12px"></div>`;

  html += `<div class="onchain-panel" style="border-radius:6px">
    <div class="onchain-activity">
      <div class="onchain-activity-header">
        <span class="onchain-live-dot" style="width:5px;height:5px"></span>
        <span>ATIVIDADE RECENTE · TODAS AS WALLETS</span>
        <span style="color:var(--muted);font-size:11px;margin-left:auto">${allActivity.length} eventos</span>
      </div>
      <div class="onchain-activity-list">`;

  if (allActivity.length === 0) {
    html += `<div class="empty-state" style="padding:20px">Nenhuma atividade recente</div>`;
  } else {
    allActivity.forEach((a, ai) => {
      const ww = WALLETS[a._wi];
      const type = (a.type || '').toUpperCase();
      const isRedeem = type.includes('REDEEM');
      const isSell = type.includes('SELL') || isRedeem;
      let icon, tagColor;
      if (isRedeem)    { icon = '★'; tagColor = 'var(--blue)'; }
      else if (isSell) { icon = '▼'; tagColor = 'var(--red)'; }
      else             { icon = '▲'; tagColor = 'var(--green)'; }
      const outcome = (a.outcome || '').toUpperCase();
      const isYes = outcome === 'YES';
      const price = parseFloat(a.price) || 0;
      const usdcSize = parseFloat(a.usdcSize || a.amount) || 0;
      html += `<div class="onchain-act-row${ai === 0 ? ' onchain-act-latest' : ''}">
        <span style="color:${ww.color};font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;min-width:28px">${ww.label}</span>
        <div class="onchain-act-icon" style="color:${tagColor}">${icon}</div>
        <div class="onchain-act-type" style="color:${tagColor}">${type||'—'}</div>
        ${outcome ? `<span class="outcome-tag ${isYes?'outcome-yes':'outcome-no'}" style="font-size:10px;padding:2px 6px">${outcome}</span>` : ''}
        <div class="onchain-act-market">${a.title || a.market || '—'}</div>
        <div class="onchain-act-val">${usdcSize > 0 ? fmt$(usdcSize) : ''}${price > 0 ? ' @ '+(price*100).toFixed(1)+'¢' : ''}</div>
        <div class="onchain-act-time">${fmtDate(a.timestamp || a.createdAt)}</div>
      </div>`;
    });
  }

  html += `</div></div></div>`;
  html += `</div>`;

  el.innerHTML = html;
}

// ─── Combined view ────────────────────────────────────────────────
function renderCombined() {
  const el = document.getElementById('panel-combined');
  if (!el) return;

  const allClosed = walletData.flatMap((d, i) =>
    (Array.isArray(d?.closed) ? d.closed : []).map(p => ({ ...p, _walletIdx: i }))
  );

  // Filter out resolved/closed positions from open list (same logic as renderWallet)
  const allClosedCondIds = new Set(allClosed.map(p => p.conditionId).filter(Boolean));
  const allPositions = walletData.flatMap((d, i) =>
    (Array.isArray(d?.positions) ? d.positions : []).filter(p => {
      if (p.conditionId && allClosedCondIds.has(p.conditionId)) return false;
      const cpRaw = p.currPrice ?? p.currentPrice ?? null;
      if (cpRaw !== null) {
        const cp = parseFloat(cpRaw) || 0;
        if (cp >= 0.999) return false;
      }
      return true;
    }).map(p => ({ ...p, _walletIdx: i }))
  );

  function walletTotal(d) {
    const posVal = (Array.isArray(d?.positions) ? d.positions : []).reduce((a,p) => a+(parseFloat(p.currentValue)||0), 0);
    const onChain = typeof d?.usdcBalance === 'number' ? d.usdcBalance : 0;
    const apiCash = d?.value ? (parseFloat(d.value.cashBalance) || parseFloat(d.value.availableBalance) || parseFloat(d.value.usdcBalance) || parseFloat(d.value.cash) || 0) : 0;
    const cash = onChain >= 0.01 ? onChain : apiCash;
    let total = posVal + cash;
    if (cash < 0.01 && d?.value?.value) { const api = parseFloat(d.value.value)||0; if (api > posVal) total = api; }
    return total;
  }

  const totalValue   = walletData.reduce((s,d) => s + walletTotal(d), 0);
  const totalPnl     = allPositions.reduce((s,p) => s + (parseFloat(p.cashPnl)||0), 0)
                     + allClosed.reduce((s,p) => s + (parseFloat(p.realizedPnl)||0), 0);
  const unrealized   = allPositions.reduce((s,p) => s + (parseFloat(p.cashPnl)||0), 0);
  const realized     = allClosed.reduce((s,p) => s + (parseFloat(p.realizedPnl)||0), 0);
  const invested     = allPositions.reduce((s,p) => s + (parseFloat(p.totalBought)||0), 0);
  const totalVol     = walletData.reduce((s, d) => s + (parseFloat(Array.isArray(d?.leaderboard)?d.leaderboard[0]?.vol:0)||0), 0) + pastWalletsVolume;

  let html = `<div class="fade-in">`;

  // Wallet chips
  html += `<div class="combined-header">`;
  WALLETS.forEach((w, i) => {
    const d = walletData[i];
    const val = walletTotal(d);
    html += `<div class="wallet-chip" style="border-color:${w.color};color:${w.color}">
      <span style="width:6px;height:6px;border-radius:50%;background:${w.color}"></span>
      ${w.label} · ${fmt$(val)}
    </div>`;
  });
  html += `</div>`;

  // KPIs
  html += `<div class="kpi-grid">
    <div class="kpi" style="--kc:#fff">
      <div class="kpi-label">Portfolio Total</div>
      <div class="kpi-val neutral glow">${fmt$(totalValue)}</div>
      <div class="kpi-sub">${WALLETS.length} wallets combinadas</div>
    </div>
    <div class="kpi" style="--kc:${totalPnl>=0?'var(--green)':'var(--red)'}">
      <div class="kpi-label">PnL Total</div>
      <div class="kpi-val ${pnlClass(totalPnl)}">${pnlSign(totalPnl)}${fmt$(totalPnl)}</div>
      <div class="kpi-sub">${invested > 0 ? fmtPct(totalPnl/invested*100)+' sobre investido' : ''}</div>
    </div>
    <div class="kpi" style="--kc:${unrealized>=0?'var(--green)':'var(--red)'}">
      <div class="kpi-label">Não Realizado</div>
      <div class="kpi-val ${pnlClass(unrealized)}">${pnlSign(unrealized)}${fmt$(unrealized)}</div>
      <div class="kpi-sub">${allPositions.length} posições abertas</div>
    </div>
    <div class="kpi" style="--kc:${realized>=0?'var(--green)':'var(--red)'}">
      <div class="kpi-label">Realizado</div>
      <div class="kpi-val ${pnlClass(realized)}">${pnlSign(realized)}${fmt$(realized)}</div>
      <div class="kpi-sub">${allClosed.length} posições fechadas</div>
    </div>
    <div class="kpi" style="--kc:var(--blue)">
      <div class="kpi-label">Investido Total</div>
      <div class="kpi-val neutral">${fmt$(invested)}</div>
      <div class="kpi-sub">abertas somadas</div>
    </div>
    <div class="kpi" style="--kc:var(--purple)">
      <div class="kpi-label">Volume Total</div>
      <div class="kpi-val neutral">${fmt$(totalVol)}</div>
      <div class="kpi-sub">all-time${pastWallets.length > 0 ? ' + inativas' : ''}</div>
    </div>
    <div class="kpi" style="--kc:var(--yellow)">
      <div class="kpi-label">Melhor Posição</div>`;

  const best = allPositions.sort((a,b)=>(parseFloat(b.cashPnl)||0)-(parseFloat(a.cashPnl)||0))[0];
  if (best) {
    const bw = WALLETS[best._walletIdx];
    html += `<div class="kpi-val pos-green">+${fmt$(parseFloat(best.cashPnl)||0)}</div>
      <div class="kpi-sub" style="color:${bw.color}">${bw.label} · ${(best.title||best.market||'').slice(0,20)}</div>`;
  } else { html += `<div class="kpi-val neutral">—</div>`; }
  html += `</div></div>`;

  // All positions table
  html += `<div class="table-wrap">
    <div class="table-header">
      <span class="table-header-title">Todas as Posições Abertas</span>
      <span class="table-count">${allPositions.length}</span>
    </div>
    <div class="t-scroll"><table>
      <thead><tr>
        <th>Wallet</th><th>Mercado</th><th>Outcome</th>
        <th>Preço Médio</th><th>Preço Atual</th><th>Valor</th><th>PnL</th>
      </tr></thead><tbody>`;

  allPositions.sort((a,b) => (parseFloat(b.cashPnl)||0)-(parseFloat(a.cashPnl)||0)).forEach(p => {
    const w = WALLETS[p._walletIdx];
    const cashPnl = parseFloat(p.cashPnl) || 0;
    const outcome = (p.outcome||'').toUpperCase();
    const isYes = outcome === 'YES';
    const currPrice = parseFloat(p.currPrice || p.currentPrice) || 0;
    const avgPrice  = parseFloat(p.avgPrice) || 0;
    const currVal   = parseFloat(p.currentValue) || 0;
    html += `<tr>
      <td><span style="color:${w.color};font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700">${w.label}</span></td>
      <td><div class="market-name">${p.title || p.market || p.conditionId?.slice(0,20)+'...' || '—'}</div></td>
      <td><span class="outcome-tag ${isYes?'outcome-yes':'outcome-no'}">${outcome||'—'}</span></td>
      <td><span class="price-badge">${avgPrice>0?(avgPrice*100).toFixed(1)+'¢':'—'}</span></td>
      <td><span class="price-badge" style="color:${currPrice>avgPrice?'var(--green)':currPrice<avgPrice?'var(--red)':'inherit'}">${currPrice>0?(currPrice*100).toFixed(1)+'¢':'—'}</span></td>
      <td>${fmt$(currVal)}</td>
      <td class="${pnlClass(cashPnl)}">${cashPnl!==0?pnlSign(cashPnl)+fmt$(cashPnl):'—'}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;
  html += `</div>`;

  el.innerHTML = html;
}

      <p>CARREGANDO LIVE DATA…</p>
    </div>
  </div>`;
  html += `<div class="wallet-panel${act==='combined'?' active':''}" id="panel-combined">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>CARREGANDO DADOS COMBINADOS…</p>

}

async function loadAll() {

  const activeTab = currentTab;

  buildPanels();

  const promises = WALLETS.map((w, i) =>
    loadWallet(i).then(() => {
      renderWallet(i);
    }).catch(e => {
      console.error('Error loading wallet', i, e);
    })
  );

  promises.push(loadPastWalletsVolume());

  await Promise.all(promises);
  renderCombined();
  renderLive();
  renderOverview();

  showWallet(activeTab);

  document.getElementById('lastUpdate').textContent =
    'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');

  // Check for new trades and show toast notifications
  checkForNewTrades();

  // ─── USDC retry pass ───────────────────────────────────────────
  const retryIndices = [];
  walletData.forEach((d, i) => {
    if (d && (typeof d.usdcBalance !== 'number' || d.usdcBalance < 0.01)) {
      retryIndices.push(i);
    }
  });

  if (retryIndices.length > 0) {
    console.log('USDC retry pass for wallets:', retryIndices.map(i => `W${i+1}`).join(', '));
    for (const i of retryIndices) {
      await new Promise(r => setTimeout(r, 500));
      const bal = await fetchUsdcBalance(WALLETS[i].addr, 2, 0);
      if (bal >= 0.01 && walletData[i]) {
        console.log(`USDC retry success for W${i+1}: $${bal.toFixed(2)}`);
        walletData[i].usdcBalance = bal;
        renderWallet(i);
      }
    }
    renderCombined();
    renderLive();
    renderOverview();
    showWallet(currentTab);
  }
}

// ─── Sortable table ───────────────────────────────────────────────
const _sortState = {};
function sortTable(tableId, colIdx, type, thEl) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const key = tableId + '_' + colIdx;
  const prev = _sortState[key] || 'none';
  const dir  = prev === 'asc' ? 'desc' : 'asc';
  _sortState[key] = dir;

  // Update header classes
  table.querySelectorAll('th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
  });
  thEl.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');

  const tbody = table.querySelector('tbody');
  const rows  = Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a, b) => {
    const aCell = a.cells[colIdx];
    const bCell = b.cells[colIdx];
    let aVal = (aCell?.dataset?.val ?? aCell?.textContent ?? '').trim();
    let bVal = (bCell?.dataset?.val ?? bCell?.textContent ?? '').trim();
    if (type === 'num') {
      aVal = parseFloat(aVal) || 0;
      bVal = parseFloat(bVal) || 0;
      return dir === 'asc' ? aVal - bVal : bVal - aVal;
    } else {
      return dir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
    }
  });
  rows.forEach(r => tbody.appendChild(r));
}

function getCityImage(marketTitle) {
  if (!marketTitle) return CITY_IMAGES['default'];
  const lower = marketTitle.toLowerCase();
  for (const [city, url] of Object.entries(CITY_IMAGES)) {
    if (city !== 'default' && lower.includes(city)) return url;
  }
  return CITY_IMAGES['default'];
}

const TOAST_DURATION = 60000; // 60 seconds

// ─── Audio Notification via Web Audio API ────────────────────────
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { console.warn('Web Audio not supported'); }
  }
  return _audioCtx;
}

function playNotifSound(type) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  // Resume if suspended (browser autoplay policy)
  if (ctx.state === 'suspended') ctx.resume();

  const now = ctx.currentTime;

  if (type === 'buy') {
    // Bright, high-pitched double beep
    [0, 0.12].forEach((delay) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200, now + delay);
      osc.frequency.exponentialRampToValueAtTime(1600, now + delay + 0.08);
      gain.gain.setValueAtTime(0.18, now + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.15);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + delay);
      osc.stop(now + delay + 0.15);
    });
  } else if (type === 'sell') {
    // Low, descending tone
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(500, now);
    osc.frequency.exponentialRampToValueAtTime(280, now + 0.25);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.3);
  } else if (type === 'redeem') {
    // Deep, resonant chord — two low tones
    [320, 400].forEach((freq, fi) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.4);
    });
  }
}

function getTradeCategory(typeStr) {
  const t = (typeStr || '').toUpperCase();
  if (t.includes('REDEEM')) return 'redeem';
  if (t.includes('SELL')) return 'sell';
  return 'buy';
}

function buildTradeEntryHTML(trade) {
  const w = trade._wallet;
  const type = (trade.type || '').toUpperCase();
  const category = getTradeCategory(type);
  const outcome = (trade.outcome || '').toUpperCase();
  const isYes = outcome === 'YES';
  const price = parseFloat(trade.price) || 0;
  const usdcSize = parseFloat(trade.usdcSize || trade.amount) || 0;
  const marketTitle = trade.title || trade.market || '—';
  const cityImg = getCityImage(marketTitle);
  const timeStr = new Date().toLocaleTimeString('pt-BR');

  let badgeClass, badgeText;
  if (category === 'redeem') { badgeClass = 'redeem'; badgeText = 'REDEEM'; }
  else if (category === 'sell') { badgeClass = 'sell'; badgeText = 'SELL'; }
  else { badgeClass = 'buy'; badgeText = 'BUY'; }

  // Outcome + Price display
  let outcomeDisplay = '—';
  if (outcome && price > 0) {
    outcomeDisplay = `<span style="color:${isYes ? 'var(--green)' : 'var(--red)'}">${outcome}</span> <span style="color:var(--muted)">@</span> ${(price * 100).toFixed(1)}¢`;
  } else if (outcome) {
    outcomeDisplay = `<span style="color:${isYes ? 'var(--green)' : 'var(--red)'}">${outcome}</span>`;
  } else if (price > 0) {
    outcomeDisplay = `${(price * 100).toFixed(1)}¢`;
  }

  return `<div class="trade-toast-entry">
    <div class="trade-toast-img">
      <img src="${cityImg}" alt="" onerror="this.style.display='none'">
      <div class="trade-toast-img-overlay">
        <span class="trade-toast-badge ${badgeClass}">${badgeText}</span>
        <span class="trade-toast-time">${timeStr}</span>
      </div>
    </div>
    <div class="trade-toast-body">
      <div class="trade-toast-market">${marketTitle}</div>
      <div class="trade-toast-grid">
        <div class="trade-toast-stat">
          <div class="trade-toast-stat-label">Outcome</div>
          <div class="trade-toast-stat-val">${outcomeDisplay}</div>
        </div>
        <div class="trade-toast-stat">
          <div class="trade-toast-stat-label">Valor</div>
          <div class="trade-toast-stat-val" style="color:var(--blue)">
            ${usdcSize > 0 ? fmt$(usdcSize) : '—'}
          </div>
        </div>
      </div>
      <div class="trade-toast-wallet${_toastBlurred ? ' toast-wallet-blurred' : ''}">
        <div class="trade-toast-wallet-dot" style="background:${w.color}"></div>
        <span class="trade-toast-wallet-label">${w.label}</span>
        <span class="trade-toast-wallet-addr" style="color:${w.color}">${w.short}</span>
      </div>
      ${usdcSize > 0 && price > 0 ? `<div class="trade-toast-amount">${Math.floor(usdcSize / price)} quotas · ${type}</div>` : ''}
    </div>
  </div>`;
}

function addTradeToPanel(trade) {
  if (_toastClosing) return; // Don't reopen during exit animation

  const overlay = document.getElementById('tradeToastOverlay');
  const entries = document.getElementById('toastEntries');
  const countEl = document.getElementById('toastCount');
  if (!overlay || !entries) return;

  // Add to entries list (newest on top)
  _toastEntries.unshift(trade);
  entries.insertAdjacentHTML('afterbegin', buildTradeEntryHTML(trade));
  countEl.textContent = _toastEntries.length;

  // Show panel if not visible
  if (!overlay.classList.contains('visible')) {
    overlay.className = 'trade-toast-overlay';
    overlay.style.cssText = 'display:flex;';
    requestAnimationFrame(() => overlay.classList.add('visible'));
  }

  // Play sound — only ONE sound per batch call (handled in checkForNewTrades)
  // Sound is played from checkForNewTrades, not here

  // Reset auto-close timer on each new trade — panel disappears 60s after last trade
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
  _toastTimer = setTimeout(() => closeTradePanel(), TOAST_DURATION);
}

function closeTradePanel() {
  const overlay = document.getElementById('tradeToastOverlay');
  const entries = document.getElementById('toastEntries');
  const countEl = document.getElementById('toastCount');
  if (!overlay) return;

  // Clear timer
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }

  // Block re-opens during exit
  _toastClosing = true;

  // Start exit animation
  overlay.classList.remove('visible');
  overlay.classList.add('exit');

  // After animation, fully reset everything
  setTimeout(() => {
    overlay.classList.remove('exit');
    overlay.className = 'trade-toast-overlay';
    overlay.style.cssText = 'display:none;';
    if (entries) entries.innerHTML = '';
    if (countEl) countEl.textContent = '0';
    _toastEntries = [];
    _toastClosing = false; // Allow new toasts again
  }, 400);
}

// Check for new trades after each data load
function checkForNewTrades() {
  const currentIds = new Set();
  const newTrades = [];

  walletData.forEach((d, i) => {
    if (!d) return;
    const activity = Array.isArray(d.activity) ? d.activity : [];
    activity.forEach(a => {
      const id = `${i}_${a.timestamp || a.createdAt}_${a.type}_${(a.title||a.market||'').slice(0,30)}`;
      currentIds.add(id);
      if (_prevActivityIds.size > 0 && !_prevActivityIds.has(id)) {
        newTrades.push({ ...a, _wallet: WALLETS[i] });
      }
    });
  });

  // Add new trades to the panel (max 5 to avoid flooding)
  if (_prevActivityIds.size > 0 && newTrades.length > 0) {
    const toShow = newTrades.slice(0, 5);

    // Determine the dominant sound: pick the "most important" category
    // Priority: redeem > sell > buy
    let soundType = 'buy';
    for (const t of toShow) {
      const cat = getTradeCategory(t.type);
      if (cat === 'redeem') { soundType = 'redeem'; break; }
      if (cat === 'sell') soundType = 'sell';
    }

    // Play ONE aggregated sound
    playNotifSound(soundType);

    // Add all to the panel
    toShow.forEach(t => addTradeToPanel(t));
  }

  _prevActivityIds = currentIds;
}

// ─── Silent background refresh (no loading states, no panel rebuild) ──
let _silentRefreshRunning = false;
let _prevDataHash = '';

function hashWalletData() {
  // Quick hash to detect if anything actually changed
  try {
    return walletData.map((d, i) => {
      if (!d) return 'null';
      const actLen = Array.isArray(d.activity) ? d.activity.length : 0;
      const posLen = Array.isArray(d.positions) ? d.positions.length : 0;
      const posVal = (Array.isArray(d.positions) ? d.positions : []).reduce((s,p) => s + (parseFloat(p.currentValue)||0), 0).toFixed(2);
      const firstAct = Array.isArray(d.activity) && d.activity[0] ? (d.activity[0].timestamp || d.activity[0].createdAt || '') : '';
      return `${i}:${actLen}:${posLen}:${posVal}:${firstAct}`;
    }).join('|');
  } catch(e) { return Math.random().toString(); }
}

async function silentRefresh() {
  if (_silentRefreshRunning) return;
  _silentRefreshRunning = true;
  console.log('[Silent refresh] fetching…');

  try {
    // Safety: force-close toast overlay if it's been stuck visible without timer
    const overlay = document.getElementById('tradeToastOverlay');
    if (overlay && overlay.classList.contains('visible') && !_toastTimer && !_toastClosing) {
      console.log('[Silent refresh] stale toast detected, force closing');
      closeTradePanel();
    }

    // Fetch all wallet data in background — this only updates walletData[], touches NO DOM
    const promises = WALLETS.map((w, i) =>
      loadWallet(i).catch(e => {
        console.warn('Silent refresh error wallet', i, e.message);
      })
    );
    await Promise.all(promises);

    // Check for new trades → show toast (this only reads walletData, no DOM changes)
    checkForNewTrades();

    // Always re-render the active panel — true hard refresh, transparent to user
    const tab = currentTab;
    if (typeof tab === 'number') renderWallet(tab);
    if (tab === 'live') renderLive();
    if (tab === 'overview') renderOverview();
    if (tab === 'combined') renderCombined();

    _prevDataHash = hashWalletData();

    // Update timestamp
    document.getElementById('lastUpdate').textContent =
      'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');

    console.log('[Silent refresh] UI updated');
  } catch (e) {
    console.warn('[Silent refresh] error:', e.message);
  }

  _silentRefreshRunning = false;
}

// Auto-refresh every 60s in background to detect new trades
setInterval(silentRefresh, 60000);
</script>
</body>
</html>
